<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Star Kit</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; }
      body {
        /* W6 polish: 380px was the W1 baseline when the popup was just PAT
         * input + 10 stars. Now we render: long-form subtitle (e.g.
         * "1234 stars · 567 indexed · 3m ago") + Sync button + search input
         * with Go button + 3 action buttons in a flex row + code snippets
         * with file:line permalinks. 480px is the standard Chrome-extension
         * popup width that fits all of this without truncation. */
        width: 480px;
        min-height: 480px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
      }
      /* R32 favbox-inspired: explicit theme tokens for OS dark-mode.
       * Mirrors manage/index.html's defaults — popup previously relied on
       * Chrome's color-scheme declaration alone, which sets text/bg via the
       * browser's UA stylesheet. That works on most platforms but a few
       * Linux desktops + corporate Chromiums leave the popup with default
       * #ffffff bg in dark mode → black-on-white text in a dark browser. */
      @media (prefers-color-scheme: dark) {
        body { background: #0d1117; color: #c9d1d9; }
      }
      @media (prefers-color-scheme: light) {
        body { background: #ffffff; color: #1f2328; }
      }
      #root { width: 100%; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
