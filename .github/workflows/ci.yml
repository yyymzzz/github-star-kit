name: CI

# Gate every push / PR to main on typecheck + tests so the green-test
# baseline (217 as of W3 D1) can't drift. Hardening discipline lives in
# the repo, not in muscle memory.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a newer commit lands on the same ref. Saves
# Actions minutes when a PR gets several pushes in a row.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (catches what tsc --noEmit doesn't)
        run: pnpm build
